name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# CI pins the Flipper-IRDB commit for a deterministic build. The *add-on* never
# sets a ref (it uses the source repo's default branch); only CI does, via --ref.
env:
  FLIPPER_REF: d126fb1b6f1e114c52b4a8c19839ea65e3a9c24d
  IMAGE: esphome-ir-codegen:ci

jobs:
  lint-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"        # required by infrared-protocols
      - run: pip install ruff pytest -r requirements.txt
      - run: ruff check .
      - run: pytest -q

  firmware:
    name: Sony Bravia → firmware (whole-DB Docker service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - name: Build codegen image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Start the add-on exactly as Home Assistant would: just the source repo
      # (default), no path/out. --ref only pins the flipper commit for stable CI.
      # The service builds one repo per adapter: flipper.git + ha-ir.git.
      - name: Start codegen service (path-less)
        run: |
          docker run -d --name ir-codegen -p 9418:9418 "$IMAGE" --serve --ref "$FLIPPER_REF"
          ok=
          # First start generates the whole flipper DB (~9k) + ha-ir — give it time.
          for _ in $(seq 1 180); do
            if git ls-remote http://localhost:9418/flipper.git >/dev/null 2>&1 \
               && git ls-remote http://localhost:9418/ha-ir.git >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 2
          done
          if [ -z "$ok" ]; then
            echo "codegen service did not come up"; docker logs ir-codegen; exit 1
          fi
          echo "service is up"; docker logs ir-codegen | tail -3

      # Compile one device per adapter: flipper.git (Sony Bravia) and ha-ir.git
      # (Vizio TV) — each clones its repo and `files:` selects the component.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-esp32
      - run: pip install esphome
      - name: Compile firmware — flipper adapter (Sony Bravia)
        run: esphome compile firmware-test/device.yaml
      - name: Compile firmware — ha-ir adapter (Vizio TV)
        run: esphome compile firmware-test/device-ha-ir.yaml

      - name: Capture the generated components (the useful artifacts)
        run: |
          rm -rf _generated _artifact; mkdir -p _artifact
          git clone -q http://localhost:9418/flipper.git _generated/flipper
          git clone -q http://localhost:9418/ha-ir.git _generated/ha-ir
          cp "_generated/flipper/TVs/Sony/Sony_Bravia.yaml" "_artifact/flipper-Sony_Bravia.yaml"
          cp "_generated/ha-ir/vizio/tv.yaml" "_artifact/ha-ir-vizio-tv.yaml"
          echo "----- flipper: Sony_Bravia -----"; cat _artifact/flipper-Sony_Bravia.yaml
          echo "----- ha-ir: vizio/tv -----";      cat _artifact/ha-ir-vizio-tv.yaml

      - name: Stop codegen service
        if: always()
        run: docker rm -f ir-codegen || true

      - name: Upload generated components
        uses: actions/upload-artifact@v4
        with:
          name: ir-components
          path: _artifact/*.yaml
          if-no-files-found: error
