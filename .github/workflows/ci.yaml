name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# CI pins the Flipper-IRDB commit for a deterministic build. The *add-on* never
# sets a ref (it uses the source repo's default branch); only CI does, via --ref.
env:
  FLIPPER_REF: d126fb1b6f1e114c52b4a8c19839ea65e3a9c24d
  IMAGE: esphome-ir-codegen:ci

jobs:
  lint-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff pytest
      - run: ruff check .
      - run: pytest -q

  firmware:
    name: Sony Bravia → firmware (path-less Docker service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - name: Build codegen image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Start the add-on exactly as Home Assistant would: just the source repo
      # (default), no path/out. --ref only pins the DB commit for a stable CI.
      - name: Start codegen service (path-less)
        run: |
          docker run -d --name ir-codegen -p 9418:9418 "$IMAGE" --serve --ref "$FLIPPER_REF"
          ok=
          for _ in $(seq 1 30); do
            if git ls-remote http://localhost:9418/TVs/Sony/Sony_Bravia.git >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 1
          done
          if [ -z "$ok" ]; then
            echo "codegen service did not come up"; docker logs ir-codegen; exit 1
          fi
          echo "service is up"

      # ESPHome clones http://localhost:9418/TVs/Sony/Sony_Bravia.git — the URL
      # path is the only place the remote is named; the component is generated
      # on demand.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-esp32
      - run: pip install esphome
      - name: Compile firmware (pulls per-path from the live service)
        run: esphome compile firmware-test/device.yaml

      - name: Capture generated component (the useful artifact)
        run: |
          rm -rf _generated
          git clone -q http://localhost:9418/TVs/Sony/Sony_Bravia.git _generated
          echo "----- Sony_Bravia.yaml -----"; cat _generated/Sony_Bravia.yaml

      - name: Stop codegen service
        if: always()
        run: docker rm -f ir-codegen || true

      - name: Upload generated component
        uses: actions/upload-artifact@v4
        with:
          name: ir-component
          path: _generated/**/*.yaml
          if-no-files-found: error
