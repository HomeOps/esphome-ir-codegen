name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Source repo + ref are per-device: the device's url path picks the Flipper repo
# and `ref:` picks the branch, built on demand. The firmware-test devices pin
# Lucaslhm/Flipper-IRDB @ main (flipper) and the reserved ha-ir.git.
env:
  IMAGE: esphome-ir-codegen:ci

jobs:
  lint-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"        # required by infrared-protocols
      - run: pip install ruff pytest -r requirements.txt
      - run: ruff check .
      - run: pytest -q

  firmware:
    name: Sony Bravia → firmware (whole-DB Docker service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - name: Build codegen image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Start the add-on exactly as Home Assistant would: no repo/ref — both are
      # per-device. The reserved ha-ir.git is prebuilt at startup; flipper repos
      # build on demand. Warming `Lucaslhm/Flipper-IRDB @ main` here builds the
      # whole DB (~9k) once so the compile steps clone a warm cache.
      - name: Start codegen service (path-less)
        run: |
          docker run -d --name ir-codegen -p 9418:9418 "$IMAGE" --serve
          ok=
          # ha-ir.git is prebuilt; ls-remote of the flipper ref triggers + waits
          # on the on-demand build (a few minutes) before it returns.
          for _ in $(seq 1 180); do
            if git ls-remote http://localhost:9418/ha-ir.git >/dev/null 2>&1 \
               && git ls-remote http://localhost:9418/Lucaslhm/Flipper-IRDB.git main >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 2
          done
          if [ -z "$ok" ]; then
            echo "codegen service did not come up"; docker logs ir-codegen; exit 1
          fi
          echo "service is up"; docker logs ir-codegen | tail -3

      # Compile one device per adapter: flipper.git (Sony Bravia) and ha-ir.git
      # (Vizio TV) — each clones its repo and `files:` selects the component.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-esp32
      - run: pip install esphome
      - name: Compile firmware — flipper adapter (Sony Bravia)
        run: esphome compile firmware-test/device.yaml
      - name: Compile firmware — ha-ir adapter (Vizio TV)
        run: esphome compile firmware-test/device-ha-ir.yaml

      # Multi-remote sub-device merge: two flipper packages each carry their own
      # `esphome: devices:`; ESPHome must concatenate them and resolve every
      # device_id. `esphome config` fully validates the merge (it errors on a
      # dangling device_id), so both sub-devices appearing proves grouping works.
      - name: Validate multi-remote sub-device merge
        run: |
          esphome config firmware-test/device-multi.yaml | tee _multi.txt
          # Device names only appear in the merged esphome.devices block (buttons
          # are named "Power"), so matching both proves the lists concatenated —
          # and that two same-brand models keep distinct ids via the model word.
          grep -q "name: Sony Bravia" _multi.txt
          grep -q "name: Sony KD" _multi.txt
          grep -q "device_id: tv_sony_bravia" _multi.txt
          grep -q "device_id: tv_sony_kd" _multi.txt
          echo "both sub-devices present and referenced after package merge"

      - name: Capture the generated components (the useful artifacts)
        run: |
          rm -rf _generated _artifact; mkdir -p _artifact
          git clone -q -b main http://localhost:9418/Lucaslhm/Flipper-IRDB.git _generated/flipper
          git clone -q http://localhost:9418/ha-ir.git _generated/ha-ir
          cp "_generated/flipper/TVs/Sony/Sony_Bravia.yaml" "_artifact/flipper-Sony_Bravia.yaml"
          cp "_generated/ha-ir/vizio/tv.yaml" "_artifact/ha-ir-vizio-tv.yaml"
          echo "----- flipper: Sony_Bravia -----"; cat _artifact/flipper-Sony_Bravia.yaml
          echo "----- ha-ir: vizio/tv -----";      cat _artifact/ha-ir-vizio-tv.yaml

      - name: Stop codegen service
        if: always()
        run: docker rm -f ir-codegen || true

      - name: Upload generated components
        uses: actions/upload-artifact@v4
        with:
          name: ir-components
          path: _artifact/*.yaml
          if-no-files-found: error
