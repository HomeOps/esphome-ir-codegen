name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Pin the Flipper-IRDB DB commit (reproducibility). The *device* (which remote)
# is chosen only by firmware-test/device.yaml — CI derives the path from it, so
# no specific TV is named here.
env:
  FLIPPER_REF: d126fb1b6f1e114c52b4a8c19839ea65e3a9c24d
  IMAGE: esphome-ir-codegen:ci

jobs:
  lint-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff pytest
      - run: ruff check .
      - run: pytest -q

  firmware:
    name: Sony Bravia → firmware (live Docker service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Build the codegen image (the real image the add-on ships).
      - uses: docker/setup-buildx-action@v3
      - name: Build codegen image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. The device YAML is the only place a remote is named. Derive the
      #    Flipper .ir path from its `packages: files:` entry (.yaml -> .ir).
      - name: Resolve target .ir from the device YAML
        run: |
          OUT=$(grep -oP 'files:\s*\[\s*\K[^],\s]+' firmware-test/device.yaml | head -1)
          if [ -z "$OUT" ]; then echo "no packages files: entry found"; exit 1; fi
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          echo "IR_PATH=${OUT%.yaml}.ir" >> "$GITHUB_ENV"
          echo "device wants $OUT  <-  ${OUT%.yaml}.ir"

      # 3. Start the codegen as a LIVE git service on localhost — no artifacts,
      #    no device named here; it serves exactly what the device asked for.
      - name: Start codegen service (git daemon)
        run: |
          docker run -d --name ir-codegen -p 9418:9418 "$IMAGE" \
            --serve --ref "$FLIPPER_REF" --path "$IR_PATH" --out "$OUT"
          ok=
          for _ in $(seq 1 30); do
            if git ls-remote git://localhost:9418/irdb.git >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 1
          done
          if [ -z "$ok" ]; then
            echo "codegen service did not come up"; docker logs ir-codegen; exit 1
          fi
          echo "service is up:"; git ls-remote git://localhost:9418/irdb.git

      # 4. Compile firmware — ESPHome clones the component from the running
      #    container via `packages: url: git://localhost:9418/irdb.git`.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-esp32
      - run: pip install esphome
      - name: Compile firmware (ESPHome pulls from the live service)
        run: esphome compile firmware-test/device.yaml

      - name: Stop codegen service
        if: always()
        run: docker rm -f ir-codegen || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-sony-bravia
          path: firmware-test/.esphome/build/**/*.bin
          if-no-files-found: warn
