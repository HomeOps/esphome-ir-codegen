name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # When a release was just cut, publish the image in THIS run. Doing it here
      # (rather than a separate workflow on `release: published`) sidesteps the
      # rule that GITHUB_TOKEN-generated release events can't trigger other
      # workflows — so publishing is fully automatic with no PAT / secret.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
      - uses: docker/setup-qemu-action@v3
        if: ${{ steps.release.outputs.release_created }}
      - uses: docker/setup-buildx-action@v3
        if: ${{ steps.release.outputs.release_created }}
      - uses: docker/login-action@v3
        if: ${{ steps.release.outputs.release_created }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        if: ${{ steps.release.outputs.release_created }}
        with:
          images: ghcr.io/homeops/esphome-ir-codegen
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.release.outputs.tag_name }}
            type=raw,value=${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}
      - uses: docker/build-push-action@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
