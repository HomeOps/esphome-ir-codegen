name: ESPHome IR Codegen
version: "0.1.0"  # x-release-please-version
slug: esphome_ir_codegen
description: Serve Flipper-IRDB IR codes to ESPHome as on-demand git packages
url: https://github.com/HomeOps/esphome-ir-codegen
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
ports:
  9418/tcp: 9418
ports_description:
  9418/tcp: git-over-HTTP — ESPHome packages clone from here
# The device's package URL selects the remote on demand — no path/ref/out here.
# The ONLY option is the source DB repo; point it at a fork freely.
options:
  repo: Lucaslhm/Flipper-IRDB
schema:
  repo: str
