name: ESPHome IR Codegen
version: "0.1.0"
slug: esphome_ir_codegen
description: Serve Flipper-IRDB IR codes to ESPHome as a git:// package source
url: https://github.com/HomeOps/esphome-ir-codegen
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
# git daemon — point ESPHome `packages: url: git://<host>:9418/irdb.git` here.
ports:
  9418/tcp: 9418
ports_description:
  9418/tcp: git daemon for ESPHome `packages:` clones
# Which remote to serve. Leave defaults blank and set `path` (the Flipper-IRDB
# .ir path); `out` defaults to the same path with a .yaml extension.
options:
  ref: main
  path: ""
  out: ""
  port: 9418
schema:
  ref: str
  path: str
  out: str?
  port: int?
