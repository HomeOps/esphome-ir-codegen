name: ESPHome IR Codegen
version: 0.3.0
slug: esphome_ir_codegen
description: Serve IR code sets to ESPHome as git packages (on-demand flipper + ha-ir)
url: https://github.com/HomeOps/esphome-ir-codegen
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
ports:
  9418/tcp: 9418
ports_description:
  9418/tcp: git-over-HTTP — ESPHome packages clone from here
options:
  adapters: flipper,ha-ir
schema:
  adapters: str?
