# Multi-remote sub-device merge test. Two flipper packages each contribute an
# `esphome: devices:` entry from a SEPARATE file; ESPHome deep-merges the package
# blocks (dicts merge, lists concatenate), so both sub-devices and every button's
# device_id must resolve. `esphome config` validates this merge in CI — proving
# you can include many remotes and each is grouped under its own HA device.
esphome:
  name: ir-multi

esp32:
  board: m5stack-atom
  framework:
    type: arduino

logger:

remote_transmitter:
  id: ir_tx
  pin:
    number: GPIO12
    ignore_strapping_warning: true
  carrier_duty_percent: 50%
  non_blocking: true

# The source URL + ref are written once here and reused per remote via the
# `<<: *irdb` YAML merge key — so adding a remote is one line.
.irdb: &irdb
  url: http://localhost:9418/Lucaslhm/Flipper-IRDB.git
  ref: main

packages:
  # Two Sony models from one on-demand source repo — two sub-devices after merge.
  # Same brand, distinct models: the model word is what keeps their ids from
  # colliding (both would otherwise be `tv_sony`).
  #   Sony_Bravia -> device tv_sony_bravia
  #   Sony_KD     -> device tv_sony_kd
  sony_bravia: { <<: *irdb, files: [TVs/Sony/Sony_Bravia.yaml] }
  sony_kd:     { <<: *irdb, files: [TVs/Sony/Sony_KD.yaml] }
