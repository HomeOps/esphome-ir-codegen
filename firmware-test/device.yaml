# CI compile target — an M5 Atom Lite whose front button toggles a Sony Bravia.
#
# The component is pulled on demand from the path-less codegen service: the URL
# path IS the Flipper-IRDB path (with .git), and the component is generated from
# the matching .ir at request time. The device URL is the ONLY place a remote is
# named — the add-on itself takes no path/ref/out.
esphome:
  name: ir-codegen-test

esp32:
  board: m5stack-atom        # M5 Atom Lite (ESP32-PICO)
  framework:
    type: arduino

logger:

# The Atom Lite's built-in IR LED.
remote_transmitter:
  id: ir_tx
  pin:
    number: GPIO12             # IR LED on a strapping pin — safe for output
    ignore_strapping_warning: true
  carrier_duty_percent: 50%
  non_blocking: true           # explicit (default changed in ESPHome 2025.11.0)

# `files:` selects the remote by its Flipper-IRDB path with a .yaml extension
# (ESPHome only accepts .yaml/.yml). That file holds the generated component
# (it defines id: ir_power, etc.). One repo, cloned once and shared across devices.
packages:
  sony_bravia:
    url: http://localhost:9418/default.git
    ref: main
    files: [TVs/Sony/Sony_Bravia.yaml]
    refresh: 0s

# The Atom's front "clicker" button (G39) sends the Sony power toggle by pressing
# the generated `ir_power` button (which transmits via the IR LED above).
binary_sensor:
  - platform: gpio
    name: "Atom Button"
    pin:
      number: GPIO39           # input-only; board has an external pull-up
      inverted: true
      mode:
        input: true
    on_press:
      - button.press: ir_power
