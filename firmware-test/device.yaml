# CI compile target — an M5 Atom Lite whose front button toggles a Sony Bravia.
#
# The flipper source repo is the URL path and the ref is `ref:`, so the add-on
# clones + transforms that Flipper-IRDB repo@ref on demand. Each .ir path holds
# its generated ESPHome component as .yaml; ESPHome clones it and `files:`
# selects the remote — the only place a remote is named. (See device-ha-ir.yaml
# for the reserved ha-ir.git path.)
esphome:
  name: ir-codegen-test

esp32:
  board: m5stack-atom        # M5 Atom Lite (ESP32-PICO)
  framework:
    type: arduino

logger:

# The Atom Lite's built-in IR LED.
remote_transmitter:
  id: ir_tx
  pin:
    number: GPIO12             # IR LED on a strapping pin — safe for output
    ignore_strapping_warning: true
  carrier_duty_percent: 50%
  non_blocking: true           # explicit (default changed in ESPHome 2025.11.0)

# `files:` selects the remote by its Flipper-IRDB path with a .yaml extension
# (ESPHome only accepts .yaml/.yml). That file holds the generated component
# (button ids are namespaced by path, e.g. id: tv_sony_bravia_power). One repo, cloned
# once and shared across devices.
packages:
  sony_bravia:
    url: http://localhost:9418/Lucaslhm/Flipper-IRDB.git   # source repo IS the path
    ref: main                                              # any branch/tag — built on demand
    files: [TVs/Sony/Sony_Bravia.yaml]   # refresh defaults to 1d — never set 0s

# The Atom's front "clicker" button (G39) sends the Sony power toggle by pressing
# the generated `tv_sony_bravia_power` button (which transmits via the IR LED above).
binary_sensor:
  - platform: gpio
    name: "Atom Button"
    pin:
      number: GPIO39           # input-only; board has an external pull-up
      inverted: true
      mode:
        input: true
    on_press:
      - button.press: tv_sony_bravia_power
